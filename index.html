<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src * data:; style-src 'self'; script-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'" />
    <title>[HIER JE NAAM] in het nieuws</title>
    <link rel="stylesheet" href="assets/css/newsdashboard.css" />
</head>
<body>

    <div class="content-wrapper">

      <div class="news-page-header">
        <div>
          <h1>[HIER JE NAAM] in het nieuws</h1>
          <p>Een automatisch bijgehouden overzicht van nieuwsartikelen. Ieder artikel is geverifieerd op naamsvermelding.</p>
          <div class="news-hero-stats" id="hero-stats"></div>
        </div>
      </div>

      <div class="news-controls">
        <div class="news-controls-row">
          <div class="news-search-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
            <input type="search" id="news-search" placeholder="Zoek in titel of tekst…" aria-label="Zoek in nieuwsartikelen" autocomplete="off">
          </div>
          <select id="year-filter" aria-label="Filter op jaar">
            <option value="all">Alle jaren</option>
          </select>
        </div>

        <div id="filter-container">
          <strong>Bron</strong>
          <button class="filter-btn active" data-source="all">Alles tonen</button>
        </div>

        <p id="article-counter" role="status">Artikelen aan het laden…</p>
      </div>

      <div id="nieuws-dashboard">
          <ul id="news-list"></ul>
          <p id="news-empty" hidden>Geen artikelen gevonden voor deze combinatie van filters.</p>
          <div class="load-more-container">
            <button type="button" id="load-more" class="load-more-btn" hidden>Toon meer artikelen</button>
          </div>
      </div>

    </div>

    <script src="assets/js/newsdashboard.js" defer></script>

</body>
</html>
