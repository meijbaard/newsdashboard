name: Fetch Daily News

on:
  schedule:
    - cron: '0 */4 * * *'  # Elke 4 uur
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install fast-xml-parser

      - name: Fetch and process news
        env:
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
        run: |
          mkdir -p _data
          node .github/scripts/update_news.js

      - name: Commit and push if there are changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/news.json
          git diff --staged --quiet || git commit -m "Nieuwe artikelen toegevoegd aan archief"
          git pull --rebase origin main
          git push
