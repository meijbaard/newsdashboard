name: Fetch News

on:
  schedule:
    - cron: "0 */4 * * *"  # Elke 4 uur
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install fast-xml-parser

      - name: Fetch and process news
        env:
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
        run: node .github/scripts/update_news.js

      - name: Validate news data (poortwachter)
        run: node .github/scripts/validate_news.js

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update news (gevalideerd)"
          git push

      - name: Trigger deploy workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"deploy-newsdashboard"}'
